name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

# 앱 프로젝트 경로
env:
  APP_DIR: _0_DiveChecker-APP

jobs:
  # ─────────────────────────────────────────────
  # Analyze & Test
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test

  # ─────────────────────────────────────────────
  # Android Build
  # ─────────────────────────────────────────────
  build-android:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks
      
      - name: Create key.properties
        if: github.event_name != 'pull_request'
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../upload-keystore.jks" >> android/key.properties
      
      - name: Build APK (Debug for PR)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug
      
      - name: Build APK (Release)
        if: github.event_name != 'pull_request'
        run: flutter build apk --release
      
      - name: Build App Bundle
        if: github.event_name != 'pull_request'
        run: flutter build appbundle --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/*.apk
      
      - name: Upload AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ${{ env.APP_DIR }}/build/app/outputs/bundle/release/app-release.aab

  # ─────────────────────────────────────────────
  # iOS Build
  # ─────────────────────────────────────────────
  build-ios:
    needs: test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check iOS Certificates
        id: check-certs
        run: |
          if [ -n "${{ secrets.IOS_CERTIFICATE_P12 }}" ]; then
            echo "has_certs=true" >> $GITHUB_OUTPUT
          else
            echo "has_certs=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
      
      # ───── iOS Code Signing (Release only) ─────
      - name: Install Apple Certificate
        if: github.event_name != 'pull_request' && steps.check-certs.outputs.has_certs == 'true'
        env:
          P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          # 임시 키체인 생성
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # 인증서 설치
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # 프로비저닝 프로파일 설치
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # UUID 추출 및 복사
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision))
          cp ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
      
      - name: Build iOS (No Codesign)
        if: github.event_name == 'pull_request' || steps.check-certs.outputs.has_certs != 'true'
        run: flutter build ios --release --no-codesign
      
      - name: Build iOS IPA (Signed Release)
        if: github.event_name != 'pull_request' && steps.check-certs.outputs.has_certs == 'true'
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
      
      - name: Upload iOS Build (Unsigned)
        if: github.event_name == 'pull_request' || steps.check-certs.outputs.has_certs != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ${{ env.APP_DIR }}/build/ios/iphoneos/Runner.app
      
      - name: Upload iOS IPA (Signed)
        if: github.event_name != 'pull_request' && steps.check-certs.outputs.has_certs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.APP_DIR }}/build/ios/ipa/*.ipa

      - name: Upload to App Store Connect
        if: startsWith(github.ref, 'refs/tags/v') && steps.check-certs.outputs.has_certs == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --verbose
          rm -f ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  # ─────────────────────────────────────────────
  # Linux Build
  # ─────────────────────────────────────────────
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Linux
        run: flutter build linux --release
      
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ env.APP_DIR }}/build/linux/x64/release/bundle

  # ─────────────────────────────────────────────
  # Windows Build
  # ─────────────────────────────────────────────
  build-windows:
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Windows
        run: flutter build windows --release
      
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ env.APP_DIR }}/build/windows/x64/runner/Release

  # ─────────────────────────────────────────────
  # macOS Build
  # ─────────────────────────────────────────────
  build-macos:
    needs: test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Check macOS Certificates
        id: check-certs
        run: |
          if [ -n "${{ secrets.MACOS_CERTIFICATE_APP_P12 }}" ]; then
            echo "has_certs=true" >> $GITHUB_OUTPUT
          else
            echo "has_certs=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      # ───── macOS Code Signing (Release only) ─────
      - name: Install Apple Certificates
        if: github.event_name != 'pull_request' && steps.check-certs.outputs.has_certs == 'true'
        env:
          APP_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_APP_P12 }}
          APP_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_APP_PASSWORD }}
          INSTALLER_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_INSTALLER_P12 }}
          INSTALLER_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_INSTALLER_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          # 임시 키체인 생성
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Application 인증서 설치 (3rd Party Mac Developer Application)
          echo "$APP_P12_BASE64" | base64 --decode > $RUNNER_TEMP/app_certificate.p12
          security import $RUNNER_TEMP/app_certificate.p12 -P "$APP_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          # Installer 인증서 설치 (3rd Party Mac Developer Installer)
          echo "$INSTALLER_P12_BASE64" | base64 --decode > $RUNNER_TEMP/installer_certificate.p12
          security import $RUNNER_TEMP/installer_certificate.p12 -P "$INSTALLER_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # 프로비저닝 프로파일 설치
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 --decode > $RUNNER_TEMP/macos_profile.provisionprofile

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $RUNNER_TEMP/macos_profile.provisionprofile))
          cp $RUNNER_TEMP/macos_profile.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.provisionprofile

      - name: Build macOS (Unsigned for PR)
        if: github.event_name == 'pull_request' || steps.check-certs.outputs.has_certs != 'true'
        run: flutter build macos --release

      - name: Build macOS (Signed Release)
        if: github.event_name != 'pull_request' && steps.check-certs.outputs.has_certs == 'true'
        run: |
          flutter build macos --release

          APP_PATH="build/macos/Build/Products/Release/DiveChecker.app"

          # 앱 코드서명 (deep sign with entitlements)
          codesign --deep --force --options runtime \
            --sign "3rd Party Mac Developer Application: KODENET (AWD2F2J9GP)" \
            --entitlements macos/Runner/Release.entitlements \
            "$APP_PATH"

          # .pkg 생성 (App Store 업로드용)
          productbuild --sign "3rd Party Mac Developer Installer: KODENET (AWD2F2J9GP)" \
            --component "$APP_PATH" /Applications \
            build/macos/Build/Products/Release/DiveChecker.pkg

      - name: Upload macOS Build (Unsigned)
        if: github.event_name == 'pull_request' || steps.check-certs.outputs.has_certs != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ env.APP_DIR }}/build/macos/Build/Products/Release/*.app

      - name: Upload macOS Build (Signed)
        if: github.event_name != 'pull_request' && steps.check-certs.outputs.has_certs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            ${{ env.APP_DIR }}/build/macos/Build/Products/Release/*.app
            ${{ env.APP_DIR }}/build/macos/Build/Products/Release/*.pkg

      - name: Upload to App Store Connect
        if: startsWith(github.ref, 'refs/tags/v') && steps.check-certs.outputs.has_certs == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type osx \
            --file build/macos/Build/Products/Release/DiveChecker.pkg \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --verbose
          rm -f ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  # ─────────────────────────────────────────────
  # Web Build
  # ─────────────────────────────────────────────
  build-web:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: ${{ env.APP_DIR }}/build/web

  # ─────────────────────────────────────────────
  # Create GitHub Release (tag push only)
  # ─────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios, build-linux, build-windows, build-macos, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Linux
        run: |
          cd artifacts/linux-build
          tar czf ../../DiveChecker-linux-x64.tar.gz .
          cd ../..

      - name: Package Windows
        run: |
          cd artifacts/windows-build
          zip -r ../../DiveChecker-windows-x64.zip .
          cd ../..

      - name: Package macOS
        run: |
          cd artifacts/macos-build
          if [ -f *.pkg ]; then
            cp *.pkg ../../DiveChecker-macos.pkg
          fi
          zip -r ../../DiveChecker-macos.zip *.app
          cd ../..

      - name: Package Web
        run: |
          cd artifacts/web-build
          zip -r ../../DiveChecker-web.zip .
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/android-aab/*.aab
            artifacts/ios-ipa/*.ipa
            DiveChecker-linux-x64.tar.gz
            DiveChecker-windows-x64.zip
            DiveChecker-macos.zip
            DiveChecker-macos.pkg
            DiveChecker-web.zip
